# ============================================================
# HCLTech Favorite Payee Service - Application Configuration
# ============================================================

# Server
server.port=8080
spring.application.name=favorite-payee-service

# ============================================================
# MySQL Database Configuration
# Replace these values with your actual MySQL credentials
# ============================================================
#spring.datasource.url=jdbc:mysql://localhost:3306/favorite_payee_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/hclfavorite
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
# update = auto creates/updates tables based on your Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# Swagger / OpenAPI Configuration
# Access Swagger UI at: http://localhost:8080/swagger-ui.html
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# Business Rules Configuration
# ============================================================
favorite.payee.max-accounts=20
favorite.payee.page-size=5
